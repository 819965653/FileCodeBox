name: Build and push Docker image

on:
  workflow_dispatch:
  push:
    branches: [ master, dev ]
    tags: [ 'v*', 'vk*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # 如果原有有 metadata，保留；否则可删
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.qjbb.cn/filecodebox  # 硬编码测试

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: docker.qjbb.cn
          username: admin
          password: admin

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.qjbb.cn/filecodebox:latest
            docker.qjbb.cn/filecodebox:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}  # 如果有 meta
          cache-from: type=gha
          cache-to: type=gha,mode=max
