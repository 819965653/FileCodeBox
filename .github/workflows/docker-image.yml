name: Build and push Docker image

on:
  workflow_dispatch:  # 手动触发
  push:
    branches:
      - master
      - dev
    tags:
      - 'v*'
      - 'vk*'  # 如果有这个 tag 规则

env:
  REGISTRY: docker.ajbb.cn  # 你的私有 registry 域名
  IMAGE_NAME: filecodebox

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # 可选：提取 metadata（如 tags/labels），如果你原有就有就保留
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: $$   {{ env.REGISTRY }}/   $${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}     # 仓库 Secrets 里的用户名
          password: ${{ secrets.DOCKER_PASSWORD }}     # Secrets 里的密码/token

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile  # 确认你的 Dockerfile 路径
          platforms: linux/amd64,linux/arm64  # 关键：多架构构建！
          push: true
          tags: |
            $$   {{ env.REGISTRY }}/   $${{ env.IMAGE_NAME }}:latest
            $$   {{ env.REGISTRY }}/   $${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ steps.meta.outputs.tags }}  # 如果你用了 metadata-action，就合并
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 可选：清理缓存节省空间
      - name: Cleanup
        if: always()
        run: docker buildx prune -f
